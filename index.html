<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>动物型人格测试</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/jspdf-font-cn@1.0.0/dist/simhei-normal.js"></script>

<style>
/* --- 全局美化样式 --- */
:root {
    --primary-color: #4CAF50;
    --primary-hover: #45a049;
    --bg-color: #f0f2f5;
    --card-bg: #ffffff;
    --text-main: #333333;
    --text-light: #666666;
}

body { 
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; 
    margin: 0; 
    background-color: var(--bg-color); 
    color: var(--text-main);
    line-height: 1.6;
}

.container { 
    max-width: 600px; 
    margin: 30px auto; 
    padding: 30px; 
    background: var(--card-bg); 
    border-radius: 16px; 
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); 
}

h1 { 
    text-align: center; 
    font-size: 1.6em; 
    color: var(--text-main);
    margin-bottom: 25px;
}

/* 输入框与按钮 */
input[type=text] { 
    width: 100%; 
    padding: 12px 15px; 
    font-size: 16px; 
    margin-top: 10px; 
    border-radius: 8px; 
    border: 1px solid #ddd; 
    box-sizing: border-box;
    transition: border-color 0.3s;
}
input[type=text]:focus {
    border-color: var(--primary-color);
    outline: none;
}

button { 
    width: 100%; 
    padding: 14px; 
    margin-top: 20px; 
    font-size: 17px; 
    font-weight: bold;
    border: none; 
    border-radius: 8px; 
    background: var(--primary-color); 
    color: #fff; 
    cursor: pointer;
    transition: background 0.3s, transform 0.1s;
}
button:hover { background: var(--primary-hover); }
button:active { transform: scale(0.99); }

/* 题目区域 */
.question { 
    margin-bottom: 25px; 
    padding: 20px;
    border-radius: 12px;
    background-color: #fafafa;
    border: 1px solid #f0f0f0;
}
.question b { 
    display: block;
    font-size: 1.1em;
    margin-bottom: 15px;
    color: #222;
}

/* 选项美化：做成大按钮样式更方便点击 */
label { 
    display: flex; 
    align-items: center;
    padding: 10px 15px; 
    margin-bottom: 8px; 
    background: #fff;
    border: 1px solid #eee;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
}
label:hover { background-color: #f1f8f1; border-color: var(--primary-color); }
label input { margin-right: 12px; transform: scale(1.2); }

.hidden { display: none; }

/* 结果页 */
.chart-wrapper {
    position: relative;
    width: 100%;
    height: 350px;
    margin: 20px 0;
}

#resultText {
    padding: 25px;
    background-color: #f9fbf9;
    border-left: 4px solid var(--primary-color);
    border-radius: 0 8px 8px 0;
    margin-top: 25px;
}

.result-section h2 {
    font-size: 1.5em;
    color: var(--primary-color);
    margin-top: 0;
}
.result-section h3 {
    font-size: 1.1em;
    color: #444;
    margin-top: 20px;
    border-bottom: 1px solid #eee;
    padding-bottom: 5px;
}
.result-section p {
    color: var(--text-light);
    font-size: 15px;
}

/* 移动端适配 */
@media (max-width: 768px) {
    .container { margin: 15px auto; padding: 20px; width: 92%; }
    .chart-wrapper { height: 280px; }
}
</style>
</head>
<body>

<div class="container" id="startPage">
    <h1>🐾 动物型人格测试</h1>
    <p style="text-align: center; color: #666;">欢迎参加性格测评，请先输入你的姓名：</p>
    <input id="username" placeholder="请输入姓名">
    <button onclick="startTest()">开始测试</button>
</div>

<div class="container hidden" id="testPage">
    <h1>20题性格测试</h1>
    <form id="quizForm"></form>
    <button onclick="submitTest()">提交测试并查看报告</button>
</div>

<div class="container hidden" id="resultPage">
    <h1>你的测试报告</h1>
    <div class="chart-wrapper">
        <canvas id="radarChart"></canvas>
    </div>
    <div id="resultText"></div>
    <button onclick="location.reload()" style="background:#888; font-size: 14px; padding: 8px;">重新测试</button>
</div>

<script>
let currentUser="";
let radarChart=null;
let scores={lion:0,tiger:0,koala:0,owl:0};

// --- 题目内容（完全保留你的原稿） ---
const questions=[
    "当团队意见不统一时，你通常会？", "面对压力时你更可能？", "做决定时你依赖？", "朋友眼中的你是？", "工作中你最看重？",
    "遇到挑战时你会？", "在人际关系中你更倾向？", "当计划改变时你会？", "别人批评你时你会？", "你喜欢的工作节奏是？",
    "你对规则的态度是？", "你在会议中的表现是？", "面对拖延的人你会？", "你如何看待风险？", "你更擅长？",
    "在冲突中你会？", "你对细节的态度是？", "你喜欢的领导方式是？", "当别人依赖你时？", "你最不能忍受的是？"
];

const options={
    lion:["主导方向","强势应对","快速拍板","有领导力","结果导向","迎难而上","掌控局面","立即调整","直接回应","高效率","规则为目标服务","主导讨论","直接催促","大胆承担","战略规划","正面解决","关注大方向","明确指挥","承担责任","效率低下"],
    tiger:["迅速行动","积极突破","直觉判断","充满激情","速度第一","主动出击","活跃气氛","随机应变","反击回去","快速推进","灵活处理","频繁发言","立刻推进","愿意尝试","执行落实","情绪表达","重视行动","激励带动","快速帮忙","拖泥带水"],
    koala:["协调关系","寻求支持","听取建议","温和体贴","团队和谐","稳步推进","维持和谐","缓慢适应","自我反思","稳定节奏","遵守规则","倾听他人","耐心沟通","谨慎评估","支持协助","缓解矛盾","关注他人感受","民主协商","默默付出","冲突争吵"],
    owl:["分析原因","冷静分析","数据依据","理性冷静","准确无误","制定计划","理性沟通","评估影响","逻辑回应","按部就班","严格遵守","记录重点","制定流程","计算风险","数据分析","理性讨论","关注细节","制度管理","系统解决","混乱无序"]
};

function startTest(){
    let u=document.getElementById("username").value;
    if(!u){alert("请输入姓名");return;}
    currentUser=u;
    document.getElementById("startPage").classList.add("hidden");
    document.getElementById("testPage").classList.remove("hidden");
    generateQuestions();
    window.scrollTo(0,0);
}

function generateQuestions(){
    const form=document.getElementById("quizForm");
    form.innerHTML="";
    for(let i=0;i<20;i++){
        let q=document.createElement("div");
        q.className="question";
        q.innerHTML="<b>"+(i+1)+". "+questions[i]+"</b>";
        for(let type in options){
            q.innerHTML+=`<label><input type="radio" name="q${i}" value="${type}">${options[type][i]}</label>`;
        }
        form.appendChild(q);
    }
}

function submitTest(){
    scores={lion:0,tiger:0,koala:0,owl:0};
    for(let i=0;i<20;i++){
        let ans=document.querySelector('input[name="q'+i+'"]:checked');
        if(!ans){alert("请完成第 "+(i+1)+" 题");return;}
        scores[ans.value]++;
    }
    showResult();
}

function showResult(){
    document.getElementById("testPage").classList.add("hidden");
    document.getElementById("resultPage").classList.remove("hidden");
    window.scrollTo(0,0);

    let total=20;
    let percent={
        lion:Math.round(scores.lion/total*100),
        tiger:Math.round(scores.tiger/total*100),
        koala:Math.round(scores.koala/total*100),
        owl:Math.round(scores.owl/total*100)
    };

    if(radarChart){radarChart.destroy();}

    radarChart=new Chart(document.getElementById("radarChart"),{
        type:"radar",
        data:{
            labels:["狮子","老虎","考拉","猫头鹰"],
            datasets:[{
                label:"人格比例 (%)",
                data:[percent.lion,percent.tiger,percent.koala,percent.owl],
                backgroundColor:"rgba(76,175,80,0.2)",
                borderColor:"#4CAF50",
                pointBackgroundColor:"#4CAF50",
                borderWidth:2
            }]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false,
            scales:{
                r:{
                    beginAtZero:true,
                    max:100,
                    ticks:{stepSize:20, display: false}
                }
            }
        }
    });

    let maxType=Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

    // --- 报告内容（完全保留你的原稿） ---
    const report={
        lion:`<div class="result-section">
            <h2>狮子型人格</h2>
            <p>你具备强烈的目标意识与领导气质，适合决策与管理岗位。在团队中，你总是能够迅速作出决策并带领他人前进。你自信且果断，喜欢主导方向，具有较强的领导力和执行力。</p>
            <h3>人际交往</h3>
            <p>你是天生的领导者，能够掌控局面并激发他人的潜力。你有时可能显得过于强势，甚至不容忍他人的意见。为了改善人际关系，可以学会更加耐心倾听他人的声音，尊重不同的观点。</p>
            <h3>穿搭建议</h3>
            <p>狮子型人格通常喜欢引人注目，可以选择一些有设计感、独特的穿搭风格，暗示你自信和领导力。大气、简约但具个性的衣服如高档西装、定制服饰等都是不错的选择。</p>
            <h3>职业方向</h3>
            <p>适合管理岗位、企业高层领导、项目经理等需要决策和指挥的角色。</p>
            <h3>情绪管理</h3>
            <p>在面对压力时，你容易显得急躁和强硬。学会冷静思考，避免情绪失控对他人产生不良影响。</p>
        </div>`,

        tiger:`<div class="result-section">
            <h2>老虎型人格</h2>
            <p>你行动力强，充满激情与活力。在面对困难时，你总是能够迅速做出反应，迅速推进事务。你具有较强的直觉判断力和创新能力，往往能够在变化中找到机会。</p>
            <h3>人际交往</h3>
            <p>你喜欢快速行动，可能会给人一种冲动的印象。虽然你的积极性很高，但有时你过于急躁，可能会忽视他人的感受。学会适时控制自己的情绪，学会更多聆听他人的意见。</p>
            <h3>穿搭建议</h3>
            <p>老虎型人格喜欢快速行动和自由，所以穿着应简洁而富有动感。例如运动风、休闲风、科技感十足的时尚单品都是很好的选择。穿着应突出舒适感和功能性，适合自由活动。</p>
            <h3>职业方向</h3>
            <p>适合快速发展的行业如销售、市场营销、创业等，需要快速决策和行动力的工作。</p>
            <h3>情绪管理</h3>
            <p>在情绪管理上，老虎型人格有时容易情绪化，尤其是遇到挫折时。学会平衡情绪，避免因情绪过于激烈影响工作和生活。</p>
        </div>`,

        koala:`<div class="result-section">
            <h2>考拉型人格</h2>
            <p>你温和、稳重，重视和谐的人际关系。在工作和生活中，你倾向于通过与他人建立良好的关系来推动事务，尽量避免冲突，寻求共识。</p>
            <h3>人际交往</h3>
            <p>你擅长建立深厚的人际关系，关心他人，温暖而体贴。由于你太过强调和谐和稳定，可能会有时候容易显得犹豫不决，不愿做出改变。学会在关键时刻展现自己的决断力，避免拖延。</p>
            <h3>穿搭建议</h3>
            <p>考拉型人格适合穿着简洁、舒适、低调的衣物。偏爱自然色调，穿着应展现出亲和力和稳定感。适合柔和的搭配，如棉质衣物、简约款式的衣物，突出自己的温暖气质。</p>
            <h3>职业方向</h3>
            <p>适合团队协作型的岗位，如客户服务、HR、项目协调等角色。你喜欢在和谐的环境中发挥自己的优势。</p>
            <h3>情绪管理</h3>
            <p>由于较为敏感，考拉型人格容易受到外界环境的影响。学会自我调节，增强情绪的自我掌控能力，避免因为过于情绪化而错失机会。</p>
        </div>`,

        owl:`<div class="result-section">
            <h2>猫头鹰型人格</h2>
            <p>你理性、分析能力强，擅长逻辑思维和系统解决问题。你喜欢按照既定流程执行事务，注重细节和准确性。你具有较强的分析力和判断力，能够深入思考并作出精准的决策。</p>
            <h3>人际交往</h3>
            <p>你可能在交往中显得理性和冷静，有时甚至缺乏情感的表达。你需要意识到感性与理性的平衡，适当展现个人的情感和关怀，才能建立更为亲密的人际关系。</p>
            <h3>穿搭建议</h3>
            <p>猫头鹰型人格通常喜欢理性且精准的风格，穿着应注重经典、简洁和实用。例如正式的西装、条纹衬衫、黑白配色等，能够体现你严谨的思维和个性。</p>
            <h3>职业方向</h3>
            <p>适合科研、数据分析、技术开发、律师等需要高度逻辑和分析能力的职位。</p>
            <h3>情绪管理</h3>
            <p>猫头鹰型人格情绪稳定，但也容易在面对压力时陷入过度分析。学会在行动中找到情感的调节点，避免过度理性导致行动迟缓。</p>
        </div>`,
    };

    document.getElementById("resultText").innerHTML= report[maxType];
}
</script>

</body>
</html>
